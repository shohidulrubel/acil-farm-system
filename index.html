<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ACI Logistics Limited — Backward Linkage Program IFMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1c4587;--blue2:#2e75b6;--blue-l:#e8f0fe;
  --green:#1e7e34;--green-l:#e8f5e9;
  --red:#c0392b;--red-l:#fdecea;
  --amber:#e67e22;--amber-l:#fff3cd;
  --purple:#6f42c1;--purple-l:#f3e8ff;
  --teal:#0d7377;--teal-l:#e0f4f4;
  --gray:#f4f7fa;--border:#cfd8dc;
  --text:#212121;--text2:#555;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray);color:var(--text);padding-bottom:60px;}
.header{background:linear-gradient(135deg,#0d233a,var(--blue));color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.hdr-logo{width:38px;height:38px;border-radius:6px;background:#fff;padding:2px;object-fit:contain;margin-right:10px}
.hdr-title{font-size:14px;font-weight:700;letter-spacing:.3px}
.hdr-sub{font-size:10px;opacity:.8}
.nav-badge{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.content{padding:12px;max-width:700px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.04);border:1px solid #e0e0e0}
.card-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--gray);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.tiles-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:8px}
.tile-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.02);transition:transform .1s,border-color .1s;display:flex;flex-direction:column;align-items:center;gap:6px}
.tile-card:active{transform:scale(.97)}
.tile-card.active{border-color:var(--blue);background:var(--blue-l)}
.tile-card .icon{font-size:24px}
.tile-card .lbl{font-size:12px;font-weight:700}
.back-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;padding:8px 12px;margin-bottom:10px;border:1px solid #e0e0e0}
.btn-back{background:none;border:none;color:var(--blue);font-weight:700;font-size:12px;cursor:pointer}
label.lbl-f{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;margin-top:6px}
input,select,textarea{width:100%;font-size:13px;padding:9px;border:1.5px solid var(--border);border-radius:6px;background:#fdfdfd;font-family:inherit;color:var(--text);margin-bottom:6px}
input[readonly]{background:#eceff1;font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.four-col{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.btn{width:100%;padding:11px;font-size:13px;font-weight:700;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-gray{background:#607d8b;color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;width:auto;margin-top:0;border-radius:4px;cursor:pointer;border:none;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.tbl{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.tbl th{background:var(--blue);color:#fff;padding:7px;text-align:left}
.tbl td{padding:7px;border-bottom:1px solid #e0e0e0;vertical-align:middle}
.tbl tr.tot-row{background:var(--blue-l);font-weight:700;color:var(--blue)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{background:#fafafa;border:1px solid #e0e0e0;border-radius:8px;padding:10px;text-align:center}
.stat-box .val{font-size:16px;font-weight:800;color:var(--blue)}
.stat-box .lbl{font-size:9px;color:var(--text2);text-transform:uppercase;margin-top:2px}
.tab-bar{display:flex;gap:4px;margin-bottom:10px;background:#eee;padding:3px;border-radius:6px;overflow-x:auto}
.tab-item{flex:1;text-align:center;padding:6px 4px;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;background:none;border:none;color:var(--text2);white-space:nowrap}
.tab-item.active{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;display:none;z-index:9999;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.chart-box{position:relative;height:200px;width:100%}
.fingerling-row{background:#f7f9fa;border:1px solid #cfd8dc;border-radius:8px;padding:10px;margin-bottom:8px;position:relative}
.remove-row-btn{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:11px}
.voucher-badge{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue2);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;display:inline-block;margin-bottom:8px}
.section-divider{border:none;border-top:1.5px dashed var(--border);margin:10px 0}
.pill{display:inline-block;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.pill-green{background:var(--green-l);color:var(--green)}
.pill-red{background:var(--red-l);color:var(--red)}
.pill-amber{background:var(--amber-l);color:var(--amber)}
.pill-blue{background:var(--blue-l);color:var(--blue)}
.prev-entry-bar{background:var(--amber-l);border:1px solid var(--amber);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:11px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.pond-issue-row{background:#f7f9fa;border:1px solid #cfd8dc;border-radius:8px;padding:10px;margin-bottom:8px;}
.doc-status-draft{background:var(--amber-l);border:2px solid var(--amber);border-radius:8px;padding:12px;margin-bottom:10px;}
.doc-status-completed{background:var(--green-l);border:2px solid var(--green);border-radius:8px;padding:12px;margin-bottom:10px;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.btn-row .btn{flex:1;min-width:120px;margin-top:0}
.kpi-card{background:linear-gradient(135deg,#1c4587,#2e75b6);color:#fff;border-radius:12px;padding:14px;margin-bottom:8px;}
.kpi-card .val{font-size:22px;font-weight:800}
.kpi-card .lbl{font-size:10px;opacity:.8;text-transform:uppercase}
.excel-btn{background:#217346;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
@media(max-width:420px){.three-col{grid-template-columns:1fr 1fr}.four-col{grid-template-columns:1fr 1fr}}
@media print{
  body *{visibility:hidden;background:#fff!important;color:#000!important}
  #print-space,#print-space *{visibility:visible}
  #print-space{position:absolute;left:0;top:0;width:100%;padding:15px}
  .no-print{display:none!important}
}
</style>
</head>
<body>
<div class="header no-print">
  <div style="display:flex;align-items:center;">
    <img class="hdr-logo" src="https://d2t8nl1y0ie1km.cloudfront.net/public/images/shwapno_logo_og.jpg" alt="ACI Logo">
    <div>
      <p class="hdr-title">ACI Logistics Limited</p>
      <p class="hdr-sub">Backward Linkage Program — IFMS v3</p>
    </div>
  </div>
  <div class="nav-badge" id="project-indicator">IFMS Gateway</div>
</div>
<div class="content no-print" id="app-view"></div>
<div id="print-space"></div>
<div class="toast" id="global-toast"></div>

<script>


// =========================================================================
// CONFIG & STATE
// =========================================================================
var SPECIES_LIST = ['Bighead','Black Carp','Catla','Foli','Grass Carp','Gulsha','Kalbaus','Mirror Carp (Japani)','Mrigel','Rui','SIFS','Silver Carp'];
function buildSpeciesOptions(){ return SPECIES_LIST.map(s=>`<option value="${s}">${s}</option>`).join('')+'<option value="User Define">➕ User Define (Other)</option>'; }
function getSpeciesValue(selectId, customId){
  var sel=document.getElementById(selectId);
  if(!sel) return '';
  if(sel.value==='User Define'){
    var custom=(document.getElementById(customId)||{}).value||'';
    return custom.trim()||'User Define';
  }
  return sel.value;
}
var EXP_HEADS = ['Lease Value','Feed Cost','Labor Cost','Medicine Cost','Transport Cost','Harvesting Cost','Electricity & Water Supply','Fingerling Cost','Shed Cost','Maintenance','Pond Management'];
var MED_LIST = ["All Cleared","Aquakleen","Biokill","BKC","Ciproflox","Deltamethrine","Fenfen","Genabel","Germo-heat","Germo-nil","Ivermectin 3%","Krilcord","Lime","ParaCefvet","Potassium","Potassium Permanganate","TH-5 BKC","Vitamin-C","Yucca","Zeolight","Others"];
var FEED_TYPES = ['Carp Grower Floating','Carp Grower Sinking','Mixed Feed','User Define'];
var NO_DISCOUNT_HEADS = ['Lease Value','Labor Cost','Transport Cost','Harvesting Cost','Electricity & Water Supply'];
var GSTORE_HEADS = ['Feed Cost','Medicine Cost'];
var voucherCounter = {pay:1000,rec:2000,fund:3000};

var AppState = {
  view:'gateway', project:null,
  db:{ponds:[],payments:[],receipts:[],funds:[],fish_movement:[],mortality:[],feed_issues:[],medicine_issues:[]},
  cart:[], fingerlingRows:[],
  inv_tab:'fish', rep_tab:'dashboard', rep_scope:'all', rep_date_from:'', rep_date_to:'',
  feedIssueRows:[], medIssueRows:[]
};

window.onload = function(){ renderActiveView(); };

function genVoucher(type){
  var prefix=type==='pay'?'PV':type==='rec'?'RV':'FV';
  return prefix+'-'+AppState.project.substring(0,3).toUpperCase()+'-'+(++voucherCounter[type]);
}
function renderActiveView(){
  var v=AppState.view, box=document.getElementById('app-view');
  document.getElementById('project-indicator').textContent = AppState.project?("📍 "+AppState.project):"IFMS Gateway";
  if(v==='gateway') box.innerHTML=uiGateway();
  else if(v==='menu') box.innerHTML=uiMenu();
  else if(v==='payment') box.innerHTML=uiPayment();
  else if(v==='receipt') box.innerHTML=uiReceipt();
  else if(v==='funds') box.innerHTML=uiFunds();
  else if(v==='inventory') box.innerHTML=uiInventory();
  else if(v==='ponds') box.innerHTML=uiPonds();
  else if(v==='reports') box.innerHTML=uiReports();
  else if(v==='ledger') box.innerHTML=uiLedger();
  else if(v==='dashboard') box.innerHTML=uiDashboard();
  setTimeout(function(){ if(v==='reports')initAllReportCharts(); if(v==='dashboard')initDashboardCharts(); },100);
}
function navigateTo(t){AppState.view=t;document.getElementById('print-space').innerHTML='';renderActiveView();}
function selectProject(p){AppState.project=p;AppState.view='menu';renderActiveView();loadFromSheet(p);}
function navBack(t){return`<div class="back-bar no-print"><button class="btn-back" onclick="navigateTo('${t}')">⬅️ Back</button><b style="font-size:12px;color:var(--blue)">📍 ${AppState.project||''}</b></div>`;}
function today(){return new Date().toISOString().split('T')[0];}
function showToast(msg,color){
  var t=document.getElementById('global-toast');
  t.textContent=msg; t.style.background=color||'var(--green)'; t.style.display='block';
  setTimeout(()=>t.style.display='none',2800);
}
function fmt(n){return(+n||0).toLocaleString(undefined,{maximumFractionDigits:0});}
function fmtDec(n){return(+n||0).toLocaleString(undefined,{maximumFractionDigits:2});}

// =========================================================================
// GATEWAY & MENU
// =========================================================================
function uiGateway(){
  return`<div class="card" style="text-align:center;padding:25px 15px;">
    <div style="font-size:36px;margin-bottom:8px;">🐟</div>
    <h3 style="color:var(--blue);margin-bottom:4px;">ACI Fish Farm IFMS</h3>
    <p style="font-size:11px;color:var(--text2);margin-bottom:16px;">Select Active Operation Site</p>
    <div class="tiles-grid">
      <div class="tile-card" onclick="selectProject('Durgapur')"><span class="icon">🏞️</span><span class="lbl">Durgapur</span><span style="font-size:10px;color:var(--text2)">Fish Project</span></div>
      <div class="tile-card" onclick="selectProject('Mohanpur')"><span class="icon">🌊</span><span class="lbl">Mohanpur</span><span style="font-size:10px;color:var(--text2)">Fish Project</span></div>
    </div>
  </div>`;
}
function uiMenu(){
  return`<div class="back-bar no-print"><button class="btn-back" onclick="AppState.project=null;navigateTo('gateway')">⬅️ Switch Project</button></div>
  <div class="card">
    <h4 style="margin-bottom:10px;text-align:center;color:var(--blue)">📋 ${AppState.project} — Operations</h4>
    <div class="tiles-grid">
      <div class="tile-card" onclick="navigateTo('payment')"><span class="icon">💸</span><span class="lbl">A. Payment Entry</span></div>
      <div class="tile-card" onclick="navigateTo('receipt')"><span class="icon">📋</span><span class="lbl">B. Revenue Booking</span></div>
      <div class="tile-card" onclick="navigateTo('funds')"><span class="icon">🏦</span><span class="lbl">C. Fund Inflows</span></div>
      <div class="tile-card" onclick="navigateTo('inventory')"><span class="icon">📦</span><span class="lbl">D. Inventory</span></div>
      <div class="tile-card" onclick="navigateTo('reports')"><span class="icon">📊</span><span class="lbl">E. Reports</span></div>
      <div class="tile-card" onclick="navigateTo('ponds')"><span class="icon">🏊</span><span class="lbl">F. Pond Info</span></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:6px;">
      <button class="btn btn-blue" style="flex:1;padding:8px;font-size:12px;" onclick="navigateTo('dashboard')">📈 Dashboard</button>
      <button class="btn btn-gray" style="flex:1;padding:8px;font-size:12px;" onclick="navigateTo('ledger')">📒 Ledger</button>
    </div>
    <button class="btn btn-teal" style="margin-top:8px;" onclick="syncToSheet()">☁️ Sync to Google Sheet</button>
  </div>`;
}

// =========================================================================
// DASHBOARD
// =========================================================================
function uiDashboard(){
  var m=getFinancialMetrics();
  var cash=calcCashMetrics();
  var stock=getFishStock();
  var totalFish=Object.keys(stock).reduce((s,sp)=>s+Math.max(0,stock[sp].qty),0);
  var gpm=m.rev>0?((m.grossProfit/m.rev)*100).toFixed(1):'0.0';
  var npm=m.rev>0?((m.netProfit/m.rev)*100).toFixed(1):'0.0';
  var ponds=AppState.db.ponds.filter(p=>p.project===AppState.project);
  var totalBigha=ponds.reduce((s,p)=>s+(+p.bigha||0),0);
  var feedStk=calcFeedStock(); var totalFeed=Object.keys(feedStk).reduce((s,k)=>s+Math.max(0,feedStk[k]),0);
  return navBack('menu')+`
  <div class="card" style="background:linear-gradient(135deg,#0d233a,var(--blue));color:#fff;border:none;">
    <p style="font-size:11px;opacity:.8;margin-bottom:4px;">📈 Operations Dashboard</p>
    <h3 style="font-size:18px;font-weight:800;">${AppState.project} Fish Project</h3>
    <p style="font-size:10px;opacity:.7;margin-top:2px;">As of ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</p>
  </div>
  <div class="stat-grid">
    <div class="stat-box"><div class="val" style="color:var(--green)">৳${fmt(m.rev)}</div><div class="lbl">Total Revenue</div></div>
    <div class="stat-box"><div class="val" style="color:var(--red)">৳${fmt(m.cogs+m.opex)}</div><div class="lbl">Total Expenses</div></div>
    <div class="stat-box"><div class="val" style="color:${m.netProfit>=0?'var(--green)':'var(--red)'}">৳${fmt(m.netProfit)}</div><div class="lbl">Net Profit</div></div>
    <div class="stat-box"><div class="val">৳${fmt(cash.totalFund)}</div><div class="lbl">Fund Deployed</div></div>
  </div>
  <div class="stat-grid-3">
    <div class="stat-box"><div class="val">${totalFish.toLocaleString()}</div><div class="lbl">Fish in Stock (Pcs)</div></div>
    <div class="stat-box"><div class="val">${totalFeed.toLocaleString()}</div><div class="lbl">Feed Stock (Kg)</div></div>
    <div class="stat-box"><div class="val">${totalBigha}</div><div class="lbl">Total Bigha</div></div>
  </div>
  <div class="card">
    <div class="card-title">📊 Revenue vs Expense</div>
    <div class="chart-box"><canvas id="dash-chart-revexp"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">🐟 Fish Stock by Species</div>
    <div class="chart-box"><canvas id="dash-chart-fish"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">💰 Profit Margins</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="val">${gpm}%</div><div class="lbl">Gross Margin</div></div>
      <div class="stat-box"><div class="val">${npm}%</div><div class="lbl">Net Margin</div></div>
    </div>
    <div class="chart-box"><canvas id="dash-chart-margin"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">🌾 Feed Stock Status</div>
    ${Object.keys(feedStk).map(k=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee;font-size:12px;"><span><b>${k}</b></span><span class="pill ${feedStk[k]>0?'pill-green':'pill-red'}">${feedStk[k]>0?fmt(feedStk[k])+' kg':'Out of Stock'}</span></div>`).join('')}
  </div>`;
}
function initDashboardCharts(){
  var m=getFinancialMetrics();
  var stock=getFishStock();
  var c1=document.getElementById('dash-chart-revexp');
  if(c1&&!c1._ch){c1._ch=true;new Chart(c1,{type:'bar',data:{labels:['Revenue','COGS','OPEX','Net Profit'],datasets:[{label:'৳',data:[m.rev,m.cogs,m.opex,Math.max(0,m.netProfit)],backgroundColor:['#1e7e34','#c0392b','#e67e22','#1c4587']}]},options:{responsive:true,maintainAspectRatio:false}});}
  var fishLabels=SPECIES_LIST.filter(s=>stock[s]&&stock[s].qty>0);
  var fishData=fishLabels.map(s=>Math.max(0,stock[s].qty));
  var c2=document.getElementById('dash-chart-fish');
  if(c2&&!c2._ch&&fishData.length>0){c2._ch=true;new Chart(c2,{type:'doughnut',data:{labels:fishLabels,datasets:[{data:fishData,backgroundColor:['#1c4587','#2e75b6','#1e7e34','#e67e22','#c0392b','#6f42c1','#0d7377','#e83e8c','#fd7e14','#20c997','#6c757d','#ffc107']}]},options:{responsive:true,maintainAspectRatio:false}});}
  var gpm=m.rev>0?(m.grossProfit/m.rev*100):0; var npm=m.rev>0?(m.netProfit/m.rev*100):0;
  var c3=document.getElementById('dash-chart-margin');
  if(c3&&!c3._ch){c3._ch=true;new Chart(c3,{type:'bar',data:{labels:['Gross Margin %','Net Margin %'],datasets:[{label:'%',data:[gpm,npm],backgroundColor:['#2e75b6','#1e7e34']}]},options:{responsive:true,maintainAspectRatio:false}});}
}

// =========================================================================
// A. PAYMENT ENTRY
// =========================================================================
function uiPayment(){
  var ponds=AppState.db.ponds.filter(p=>p.project===AppState.project);
  var pOpts=ponds.map(p=>`<option value="${p.pond}">${p.pond} (${p.bigha}B)</option>`).join('');
  var hOpts=EXP_HEADS.map(x=>`<option value="${x}">${x}</option>`).join('');
  var voucher=genVoucher('pay');
  var prevPayments=(AppState.db.payments||[]).filter(p=>p.project===AppState.project);
  var prevBar=prevPayments.length>0?`<div class="prev-entry-bar">
    <span>📝 Last: <b>${prevPayments[prevPayments.length-1].head}</b> — ৳${fmt(prevPayments[prevPayments.length-1].netAmount)} on ${prevPayments[prevPayments.length-1].date}</span>
    <button class="btn btn-amber btn-sm" onclick="viewLastPayEntry()">👁️ View</button>
  </div>`:'';
  return navBack('menu')+prevBar+`
  <div class="card">
    <div class="card-title">💸 Payment Voucher Entry
      <span class="voucher-badge" style="margin:0">Voucher: <span id="p-voucher">${voucher}</span></span>
    </div>
    <div class="two-col">
      <div><label class="lbl-f">Transaction Date</label><input type="date" id="p-date" value="${today()}"></div>

function onPaymentHeadChange(){
  var h=document.getElementById('p-head').value;
  var pBox=document.getElementById('p-prod-box');
  var uom=document.getElementById('p-uom');
  var dRow=document.getElementById('p-discount-row');
  var lblSup=document.getElementById('lbl-supplier-name');
  var loc=document.getElementById('p-locator');
  var lblLoc=document.getElementById('lbl-locator');
  var stdSection=document.getElementById('standard-payment-section');
  var flSection=document.getElementById('fingerling-multi-section');
  var lblQty=document.getElementById('lbl-p-qty');
  var lblRate=document.getElementById('lbl-p-rate');
  if(h==='Fingerling Cost'){stdSection.style.display='none';flSection.style.display='block';if(document.getElementById('fingerling-rows-container').children.length===0)addFingerlingRow();return;}
  stdSection.style.display='block';flSection.style.display='none';
  dRow.style.display='grid';lblSup.textContent='Supplier Name';
  // Reset labels to default before applying head-specific overrides
  if(lblQty)lblQty.textContent='Quantity';
  if(lblRate)lblRate.textContent='Rate / Unit (Tk)';
  var leaseSection=document.getElementById('p-lease-period-section');
  if(leaseSection)leaseSection.style.display='none';
  if(h==='Lease Value'){
    pBox.innerHTML=`<select id="p-prod"><option value="Rent Expense">Rent Expense</option></select>`;
    uom.value='Month';uom.readOnly=true;dRow.style.display='none';setLocatorExpense(loc,lblLoc);
    var qtyEl=document.getElementById('p-qty');if(qtyEl){qtyEl.value=1;}
    if(lblQty)lblQty.textContent='No. of Months';
    if(lblRate)lblRate.textContent='Lease Amount per Month (Tk)';
    if(leaseSection){
      leaseSection.style.display='block';
      var fromEl=document.getElementById('p-lease-from');
      var toEl=document.getElementById('p-lease-to');
      var txnDate=document.getElementById('p-date').value;
      if(fromEl&&!fromEl.value)fromEl.value=txnDate;
      if(toEl&&!toEl.value)toEl.value=txnDate;
      calcLeaseMonths();
    }
    calcPaymentTotals();
  }
  else if(h==='Feed Cost'){pBox.innerHTML=`<select id="p-prod">${FEED_TYPES.map(f=>`<option value="${f}">${f}</option>`).join('')}</select>`;uom.value='kg';uom.readOnly=true;loc.innerHTML=`<option value="GStore">GStore</option>`;lblLoc.textContent='Inventory Warehouse Locator';}
  else if(h==='Labor Cost'){pBox.innerHTML=`<select id="p-prod" onchange="onLaborProdChange()"><option value="Wages">Wages</option><option value="Salary">Salary</option><option value="Others">Others</option></select>`;uom.value='Each';uom.readOnly=true;dRow.style.display='none';setLocatorExpense(loc,lblLoc);onLaborProdChange();}
  else if(h==='Medicine Cost'){var opts=MED_LIST.map(m=>`<option value="${m}">${m}</option>`).join('');pBox.innerHTML=`<select id="p-prod">${opts}</select>`;uom.value='Pack';uom.readOnly=false;loc.innerHTML=`<option value="GStore">GStore</option>`;lblLoc.textContent='Inventory Warehouse Locator';}
  else{pBox.innerHTML=`<input type="text" id="p-prod" placeholder="Enter item name">`;uom.value='Each';uom.readOnly=false;if(NO_DISCOUNT_HEADS.indexOf(h)!==-1)dRow.style.display='none';setLocatorExpense(loc,lblLoc);}
}
function setLocatorExpense(loc,lblLoc){
  var ponds=AppState.db.ponds.filter(p=>p.project===AppState.project);
  var pOpts=ponds.map(p=>`<option value="${p.pond}">${p.pond}</option>`).join('');
  loc.innerHTML=`<option value="Project">Project (${AppState.project})</option>${pOpts}`;
  lblLoc.textContent='Expense Booking Locator';
}
function onLaborProdChange(){
  var p=document.getElementById('p-prod')?document.getElementById('p-prod').value:'';
  document.getElementById('lbl-supplier-name').textContent=(p==='Salary')?'Employee Name *':'Supplier Name';
}
function calcLeaseMonths(){
  var fromEl=document.getElementById('p-lease-from');
  var toEl=document.getElementById('p-lease-to');
  var monthsEl=document.getElementById('p-lease-months');
  if(!fromEl||!toEl||!monthsEl)return;
  var from=fromEl.value,to=toEl.value;
  var months=1;
  if(from&&to){
    var d1=new Date(from),d2=new Date(to);
    months=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth())+1;
    if(months<1)months=1;
  }
  monthsEl.value=months;
  // Keep "No. of Months" Qty field in sync with the lease period span
  var qtyEl=document.getElementById('p-qty');
  if(qtyEl&&(document.getElementById('p-head')||{}).value==='Lease Value')qtyEl.value=months;
  calcPaymentTotals();
}
function calcPaymentTotals(){
  var q=+document.getElementById('p-qty').value||0;
  var r=+document.getElementById('p-rate').value||0;
  var gross=q*r;
  document.getElementById('p-gross').value=gross;
  var disc=+(document.getElementById('p-disc')||{}).value||0;
  var dType=(document.getElementById('p-disc-type')||{}).value||'Tk';
  var finalDisc=dType==='Pct'?(gross*disc/100):disc;
  document.getElementById('p-net').value=Math.max(0,gross-finalDisc);
}

function submitPaymentEntry(){
  var h=document.getElementById('p-head').value;
  if(h==='Fingerling Cost'){submitFingerlingEntry();return;}
  var prodEl=document.getElementById('p-prod');
  var prod=prodEl?(prodEl.tagName==='SELECT'?prodEl.value:prodEl.value):'';
  var q=+document.getElementById('p-qty').value||0;
  var r=+document.getElementById('p-rate').value||0;
  var sup=document.getElementById('p-supplier').value.trim();
  var mob=document.getElementById('p-mobile').value.trim();
  if(h==='Labor Cost'&&prod==='Salary'&&!sup){alert('Employee name required for Salary.');return;}
  if(q<=0||r<=0||!prod){alert('Quantity, Rate and Product are required.');return;}
  var loc=document.getElementById('p-locator').value;
  if(GSTORE_HEADS.indexOf(h)!==-1&&loc!=='GStore'){alert('Feed & Medicine must be GStore.');return;}
  if(h==='Lease Value'){
    var lFrom=(document.getElementById('p-lease-from')||{}).value;
    var lTo=(document.getElementById('p-lease-to')||{}).value;
    if(!lFrom||!lTo){alert('Lease From Date and To Date are required.');return;}
    if(lTo<lFrom){alert('Lease To Date must be after Lease From Date.');return;}
  }
  var voucher=document.getElementById('p-voucher').textContent;
  var net=+document.getElementById('p-net').value;
  var gross=+document.getElementById('p-gross').value;
  var paymentDate=document.getElementById('p-date').value;
  var entry={project:AppState.project,date:paymentDate,receivedDate:document.getElementById('p-rcvd-date').value,challanNo:document.getElementById('p-challan').value,head:h,product:prod,particular:document.getElementById('p-part').value,uom:document.getElementById('p-uom').value,qty:q,rate:r,amount:gross,discount:+(document.getElementById('p-disc')||{}).value||0,netAmount:net,supplier:sup,mobile:mob,locator:loc,type:'cost',voucher,paymentMonth:paymentDate?paymentDate.slice(0,7):''};
  if(h==='Lease Value'){
    entry.leaseFrom=(document.getElementById('p-lease-from')||{}).value||'';
    entry.leaseTo=(document.getElementById('p-lease-to')||{}).value||'';
    entry.leaseMonths=+(document.getElementById('p-lease-months')||{}).value||1;
  }
  AppState.db.payments.push(entry);
  appendToSheet('payments', entry);
  showToast('Payment saved successfully!');
  printPaymentVoucher(entry);
}

  var leaseBlock=(e.head==='Lease Value'&&e.leaseFrom&&e.leaseTo)?`

      <b style="color:#a87900;">📅 Lease Period:</b> ${e.leaseFrom} to ${e.leaseTo} (${e.leaseMonths||1} month${(e.leaseMonths||1)>1?'s':''})

  document.getElementById('print-space').innerHTML=buildPrintHeader('PAYMENT VOUCHER — BACKWARD LINKAGE PROGRAM')+`

function toggleSalesSpeciesCustom(){
  var v=document.getElementById('r-f-species').value;
  var box=document.getElementById('r-f-species-custom-box');
  if(box) box.style.display=(v==='User Define')?'block':'none';
}
function toggleSalesType(val){
  var isArat = val==='Arat';
  var discSection=document.getElementById('r-f-discount-section');
  var aqtyBox=document.getElementById('r-f-aqty-box');
  if(discSection) discSection.style.display=isArat?'none':'block';
  // For Arat: hide actual qty box; auto-set actualQty=salesQty
  if(aqtyBox) aqtyBox.style.display=isArat?'none':'block';
  calcSalesRow();
}

function calcSalesRow(){
  var salesType=(document.getElementById('r-sales-type')||{}).value||'Direct';
  var isArat=salesType==='Arat';
  var aqty=isArat?0:(+document.getElementById('r-f-aqty').value||0);
  var freePer40=+((document.getElementById('r-f-free-per-40')||{}).value||5);
  var salesQty=isArat?(+document.getElementById('r-f-aqty').value||0):(aqty>0?(aqty/(40+freePer40))*40:0);
  var discQty=isArat?0:(aqty-salesQty);
  salesQty=Math.round(Math.max(0,salesQty)*100)/100;
  discQty=Math.round(Math.max(0,discQty)*100)/100;
  if(!isArat&&document.getElementById('r-f-dqty')) document.getElementById('r-f-dqty').value=discQty;
  if(document.getElementById('r-f-sqty')) document.getElementById('r-f-sqty').value=salesQty;
  var r=+document.getElementById('r-f-rate').value||0;
  var comm=+document.getElementById('r-f-comm').value||0;
  var gross=salesQty*r;
  if(document.getElementById('r-f-amt')) document.getElementById('r-f-amt').value=gross.toFixed(2);
  if(document.getElementById('r-f-total')) document.getElementById('r-f-total').value=Math.max(0,gross-comm).toFixed(2);
}

function calcOtherRow(){document.getElementById('r-o-amt').value=(+document.getElementById('r-o-qty').value||0)*(+document.getElementById('r-o-rate').value||0);}

function addSalesLine(type){
  var item={};
  var salesType=(document.getElementById('r-sales-type')||{}).value||'Direct';
  if(type==='fish'){
    var isArat=salesType==='Arat';
    var aqty=isArat?0:(+document.getElementById('r-f-aqty').value||0);
    var freePer40=+(document.getElementById('r-f-free-per-40').value||5);
    var rawSalesQty=isArat?aqty:(aqty>0?(aqty/(40+freePer40))*40:0);
    var salesQty=Math.round(Math.max(0,rawSalesQty)*100)/100;
    var discQty=isArat?0:Math.round(Math.max(0,aqty-salesQty)*100)/100;
    item.saleType=isArat?'Arat':'Direct';
    item.product=getSpeciesValue('r-f-species','r-f-species-custom');
    item.pond=document.getElementById('r-f-pond').value;
    item.particular=document.getElementById('r-f-part').value;
    item.pcs=+document.getElementById('r-f-pcs').value||0;
    item.actualQty=isArat?salesQty:aqty;
    item.discountQty=discQty;
    item.salesQty=salesQty;
    item.rate=+document.getElementById('r-f-rate').value||0;
    item.commission=+document.getElementById('r-f-comm').value||0;
    item.amount=item.salesQty*item.rate;
    item.grandTotal=item.amount-item.commission;
    if(item.salesQty<=0||item.rate<=0){alert('Sales Qty and Rate required.');return;}
  }else{
    item.saleType='other';var base=document.getElementById('r-o-item').value;var ext=document.getElementById('r-o-custom').value.trim();item.product=ext?(base+': '+ext):base;item.pond='Overall Project';item.pcs=0;item.actualQty=+document.getElementById('r-o-qty').value||0;item.discountQty=0;item.salesQty=item.actualQty;item.rate=+document.getElementById('r-o-rate').value||0;item.commission=0;item.amount=item.salesQty*item.rate;item.grandTotal=item.amount;item.particular=document.getElementById('r-o-uom').value;
    if(item.salesQty<=0||item.rate<=0){alert('Quantity and Rate required.');return;}
  }
  AppState.cart.push(item);renderSalesCart();
}

function renderSalesCart(){
  var d=document.getElementById('sales-cart-display');
  if(!d)return;
  if(!AppState.cart.length){d.innerHTML='';return;}
  var total=0;
  var h='<table class="tbl"><thead><tr><th>Species</th><th>Pond</th><th>Pcs</th><th>Sales Qty(Kg)</th><th>Rate</th><th>TL Amount</th><th></th></tr></thead><tbody>';
  AppState.cart.forEach((x,i)=>{
    total+=x.grandTotal;
    h+=`<tr><td><b>${x.product}</b><br><small style="color:var(--text2)">${x.saleType}</small></td><td>${x.pond}</td><td>${x.pcs||0}</td><td>${x.salesQty}</td><td>৳${x.rate}</td><td><b>৳${fmt(x.grandTotal)}</b></td><td><button class="btn btn-red btn-sm" onclick="AppState.cart.splice(${i},1);renderSalesCart()">✕</button></td></tr>`;
  });
  h+=`<tr class="tot-row"><td colspan="5">Grand Total</td><td colspan="2">৳${fmt(total)}</td></tr></tbody></table>`;
  d.innerHTML=h;
}

function saveReceiptDraft(){
  var party=document.getElementById('r-party').value.trim();
  if(!AppState.cart.length){showToast('Add at least one item to draft.','var(--amber)');return;}
  var dKey=AppState.project+'_'+Date.now();
  var voucher=document.getElementById('r-voucher').value;
  var date=document.getElementById('r-date').value;
  var mobile=document.getElementById('r-mobile').value;
  var address=document.getElementById('r-address').value;
  var reference=document.getElementById('r-ref').value;
  var salesType=(document.getElementById('r-sales-type')||{}).value||'Direct';
  revDrafts[dKey]={
    partyName:party,mobile,address,reference,date,salesType,voucher,
    cart:JSON.parse(JSON.stringify(AppState.cart)),savedAt:new Date().toLocaleString()
  };
  var base={project:AppState.project,date,partyName:party||'—',mobile,address,reference,voucher,type:'revenue',status:'draft',saleType:salesType};
  var entries=AppState.cart.map(i=>Object.assign({},base,i));
  AppState.cart=[];
  showToast('Draft saved! You can continue later.','var(--amber)');
  renderActiveView();
  printSalesInvoice(entries,voucher,'Draft');
}

function showDraftList(){
  var draftKeys=Object.keys(revDrafts).filter(k=>k.startsWith(AppState.project+'_'));
  if(!draftKeys.length){showToast('No drafts saved.','var(--amber)');return;}
  var rows=draftKeys.map(k=>{
    var d=revDrafts[k];
    var total=d.cart.reduce((s,x)=>s+x.grandTotal,0);
    return`<tr>
      <td>${d.partyName||'—'}</td><td>${d.date}</td><td>${d.savedAt}</td><td>৳${fmt(total)}</td>
      <td><button class="btn btn-blue btn-sm" onclick="loadDraft('${k}')">📂 Load</button>
          <button class="btn btn-red btn-sm" onclick="deleteDraft('${k}')">🗑️</button></td>
    </tr>`;
  }).join('');
  document.getElementById('print-space').innerHTML=`<div style="font-family:Arial,sans-serif;padding:15px;">
    <h3 style="color:var(--amber);margin-bottom:10px;">📄 Saved Drafts — ${AppState.project}</h3>
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="background:var(--amber);color:#fff;"><th style="padding:6px">Customer</th><th style="padding:6px">Date</th><th style="padding:6px">Saved At</th><th style="padding:6px">Total</th><th style="padding:6px">Action</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:12px;"><button class="btn btn-red" style="width:auto;padding:8px 16px;" onclick="document.getElementById('print-space').innerHTML=''">✕ Close</button></div>
  </div>`;
}

function loadDraft(key){
  var d=revDrafts[key];if(!d)return;
  AppState.cart=d.cart;
  document.getElementById('print-space').innerHTML='';
  // Navigate back to receipt and show cart
  renderActiveView();
  setTimeout(function(){
    if(document.getElementById('r-party'))document.getElementById('r-party').value=d.partyName||'';
    if(document.getElementById('r-mobile'))document.getElementById('r-mobile').value=d.mobile||'';
    if(document.getElementById('r-address'))document.getElementById('r-address').value=d.address||'';
    if(document.getElementById('r-ref'))document.getElementById('r-ref').value=d.reference||'';
    if(document.getElementById('r-date'))document.getElementById('r-date').value=d.date||today();
    if(document.getElementById('r-sales-type')){document.getElementById('r-sales-type').value=d.salesType||'Direct';toggleSalesType(d.salesType||'Direct');}
    renderSalesCart();
    delete revDrafts[key];
    showToast('Draft loaded!','var(--blue)');
  },100);
}

function deleteDraft(key){
  delete revDrafts[key];
  showDraftList();
  showToast('Draft deleted.','var(--red)');
}

function confirmCompleteReceipt(){
  var party=document.getElementById('r-party').value.trim();
  if(!party||!AppState.cart.length){alert('Customer name and at least one item required.');return;}
  var total=AppState.cart.reduce((s,x)=>s+x.grandTotal,0);
  var body=`<div style="font-size:12px;">
    <p><b>Customer:</b> ${party}</p>
    <p><b>Date:</b> ${document.getElementById('r-date').value}</p>
    <p><b>Sales Type:</b> ${(document.getElementById('r-sales-type')||{}).value||'Direct'}</p>
    <p><b>Items:</b> ${AppState.cart.length}</p>
    <p style="font-size:14px;margin-top:8px;"><b>Grand Total: <span style="color:var(--green)">৳${fmt(total)}</span></b></p>
    <p style="color:var(--text2);margin-top:6px;font-size:11px;">Once completed, the booking will be locked. Proceed?</p>
  </div>`;
  document.getElementById('rev-confirm-body').innerHTML=body;
  document.getElementById('rev-confirm-modal').style.display='flex';
}

function submitReceipt(action){
  var party=document.getElementById('r-party').value.trim();
  if(!party||!AppState.cart.length){alert('Customer name and at least one line item required.');return;}
  var voucher=document.getElementById('r-voucher').value;
  var base={project:AppState.project,date:document.getElementById('r-date').value,partyName:party,mobile:document.getElementById('r-mobile').value,address:document.getElementById('r-address').value,reference:document.getElementById('r-ref').value,voucher,type:'revenue',status:'completed'};
  var entries=AppState.cart.map(i=>Object.assign({},base,i));
  AppState.db.receipts.push(...entries);
  entries.forEach(e => appendToSheet('receipts', e));
  showToast('Revenue booking completed!');
  AppState.cart=[];
  renderActiveView();
  printSalesInvoice(entries,voucher,'Completed');
}

function viewLastRevEntry(){
  var entries=(AppState.db.receipts||[]).filter(r=>r.project===AppState.project);
  if(!entries.length)return;
  var last=entries[entries.length-1];
  var grp=entries.filter(r=>r.voucher===last.voucher);
  printSalesInvoice(grp,last.voucher);
}

function showDocumentsByRange(){
  var from=(document.getElementById('doc-range-from')||{}).value||'';
  var to=(document.getElementById('doc-range-to')||{}).value||'9999';
  var receipts=(AppState.db.receipts||[]).filter(r=>r.project===AppState.project&&(!from||r.date>=from)&&(!to||r.date<=to));
  var vouchers=[...new Set(receipts.map(r=>r.voucher))];

function numberToWords(n){
  // Simple Taka amount approximation
  n=Math.round(+n||0);
  if(n===0)return'Zero';
  var units=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  var tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function hw(n){if(n<20)return units[n];if(n<100)return tens[Math.floor(n/10)]+(n%10?' '+units[n%10]:'');if(n<1000)return units[Math.floor(n/100)]+' Hundred'+(n%100?' '+hw(n%100):'');if(n<100000)return hw(Math.floor(n/1000))+' Thousand'+(n%1000?' '+hw(n%1000):'');if(n<10000000)return hw(Math.floor(n/100000))+' Lakh'+(n%100000?' '+hw(n%100000):'');return hw(Math.floor(n/10000000))+' Crore'+(n%10000000?' '+hw(n%10000000):'');}
  return hw(n);
}

function calcCashMetrics(){
  var payments=(AppState.db.payments||[]).filter(p=>p.project===AppState.project);
  var receipts=(AppState.db.receipts||[]).filter(r=>r.project===AppState.project);
  var funds=(AppState.db.funds||[]).filter(f=>f.project===AppState.project);
  var compFund=0,otherFund=0,paySum=0,revSum=0,accrued=0;
  var now=new Date();
  funds.forEach(f=>{var amt=+f.amount||0;if(f.source==='Company'){compFund+=amt;if(f.date){var d=new Date(f.date);var months=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());if(months>0)accrued+=(amt*0.14)*(months/12);}}else{otherFund+=amt;}});
  payments.forEach(p=>paySum+=(+p.netAmount||+p.amount||0));
  receipts.forEach(r=>revSum+=(+r.grandTotal||0));
  var totalFund=compFund+otherFund;
  return{compFund,otherFund,totalFund,accrued,payments:paySum,revenue:revSum,withInterest:totalFund-accrued-paySum+revSum,withoutInterest:totalFund-paySum+revSum};
}

function calcInventoryValuation(){
  // Computes remaining (unconsumed) stock value for Feed & Medicine — shown as Current Asset
  // and the CONSUMED portion of Feed/Medicine cost — used inside Biological Asset valuation
  var payments=(AppState.db.payments||[]).filter(p=>p.project===AppState.project);
  var feedIssues=(AppState.db.feed_issues||[]).filter(x=>x.project===AppState.project);
  var medIssues=(AppState.db.medicine_issues||[]).filter(x=>x.project===AppState.project);

  function buildValuation(purchases, issues, productKey, issueQtyKey, issueProductKey){
    var byProduct={}; // {product: {qty, amount}}
    purchases.forEach(p=>{
      var prod=p[productKey];
      if(!byProduct[prod])byProduct[prod]={qty:0,amount:0};
      byProduct[prod].qty+=(+p.qty||0);
      byProduct[prod].amount+=(+p.netAmount||+p.amount||0);
    });
    var issuedQty={};
    issues.forEach(x=>{
      var prod=x[issueProductKey];
      issuedQty[prod]=(issuedQty[prod]||0)+(+x[issueQtyKey]||0);
    });
    var remainingValue=0, consumedValue=0, totalPurchased=0;
    Object.keys(byProduct).forEach(function(prod){
      var b=byProduct[prod];
      var avgRate=b.qty>0?(b.amount/b.qty):0;
      var issued=Math.min(b.qty, issuedQty[prod]||0);
      var remainingQty=Math.max(0,b.qty-issued);
      remainingValue+=remainingQty*avgRate;
      consumedValue+=issued*avgRate;
      totalPurchased+=b.amount;
    });
    return {remainingValue, consumedValue, totalPurchased};
  }

  var feedVal=buildValuation(payments.filter(p=>p.head==='Feed Cost'), feedIssues, 'product', 'qtyKg', 'feedType');
  var medVal=buildValuation(payments.filter(p=>p.head==='Medicine Cost'), medIssues, 'product', 'qty', 'medType');

  return {
    feedRemainingValue: feedVal.remainingValue,
    feedConsumedValue: feedVal.consumedValue,
    medRemainingValue: medVal.remainingValue,
    medConsumedValue: medVal.consumedValue,
    currentAssetStock: feedVal.remainingValue + medVal.remainingValue,
    consumedFeedMedCost: feedVal.consumedValue + medVal.consumedValue
  };
}
function getFishStock(){
  var stockMap={};
  SPECIES_LIST.forEach(s=>stockMap[s]={qty:0,weight:0,ponds:{}});
  var ponds=AppState.db.ponds.filter(p=>p.project===AppState.project).map(p=>p.pond);
  ponds.forEach(p=>{SPECIES_LIST.forEach(s=>stockMap[s].ponds[p]={qty:0,weight:0});});
  (AppState.db.payments||[]).filter(p=>p.project===AppState.project&&p.head==='Fingerling Cost').forEach(p=>{
    var s=p.product;if(!stockMap[s])return;
    stockMap[s].qty+=(+p.qty||0);
    var pnd=p.locator;if(pnd&&pnd!=='Project'&&pnd!=='GStore'){if(!stockMap[s].ponds[pnd])stockMap[s].ponds[pnd]={qty:0,weight:0};stockMap[s].ponds[pnd].qty+=(+p.qty||0);}
  });
  (AppState.db.receipts||[]).filter(r=>r.project===AppState.project&&r.saleType==='fish').forEach(r=>{
    var s=r.product;if(!stockMap[s])return;
    stockMap[s].qty-=(+r.actualQty||0);
    var pnd=r.pond;if(pnd&&pnd!=='Overall Project'){if(!stockMap[s].ponds[pnd])stockMap[s].ponds[pnd]={qty:0,weight:0};stockMap[s].ponds[pnd].qty=Math.max(0,(stockMap[s].ponds[pnd].qty||0)-(+r.actualQty||0));}
  });
  (AppState.db.mortality||[]).filter(m=>m.project===AppState.project).forEach(m=>{
    var s=m.species;if(!stockMap[s])return;
    stockMap[s].qty-=(+m.qty||0);stockMap[s].weight-=(+m.weight||0);
    var pnd=m.pond;if(pnd){if(!stockMap[s].ponds[pnd])stockMap[s].ponds[pnd]={qty:0,weight:0};stockMap[s].ponds[pnd].qty=Math.max(0,(stockMap[s].ponds[pnd].qty||0)-(+m.qty||0));}
  });
  // Add biomass from fish_movement weight entries
  (AppState.db.fish_movement||[]).filter(m=>m.project===AppState.project).forEach(m=>{
    var s=m.species;if(!stockMap[s])return;
    if(m.toPond&&stockMap[s].ponds[m.toPond]){stockMap[s].ponds[m.toPond].weight=(stockMap[s].ponds[m.toPond].weight||0)+(+m.weight||0);}
  });
  return stockMap;
}

function saveFeedNoteAsImageWhatsApp(){
  var el=document.getElementById('feed-note-content');
  if(!el){showToast('Nothing to capture.','var(--amber)');return;}
  if(typeof html2canvas==='undefined'){showToast('html2canvas not available.','var(--red)');return;}
  html2canvas(el,{backgroundColor:'#ffffff',scale:2,useCORS:true}).then(function(canvas){
    canvas.toBlob(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='FeedIssueNote_'+AppState.project+'_'+today()+'.png';a.click();
      setTimeout(function(){
        var msg=encodeURIComponent('🐟 Feed Issue Note\nProject: '+AppState.project+'\nDate: '+today()+'\n(Please see the attached image)');
        window.open('https://wa.me/?text='+msg,'_blank');
        showToast('Image downloaded! Attach it in WhatsApp.','var(--teal)');
      },700);
    },'image/png');
  }).catch(function(err){showToast('Capture failed. Try Print instead.','var(--red)');});
}

// Computes the portion of a Lease Value payment that falls within [fromDate,toDate] (inclusive),
// prorating the lump-sum payment evenly across the lease period's months.
// If no report date range is supplied (fromDate/toDate both empty), the FULL lease amount counts —
// since "all time" naturally includes every prorated month.
function getProratedLeaseAmount(p, fromDate, toDate){
  var total=+p.netAmount||+p.amount||0;
  if(!p.leaseFrom||!p.leaseTo){
    // No lease period captured (legacy entry) — fall back to counting it in its payment month only
    return (!fromDate&&!toDate)?total:( (!fromDate||p.date>=fromDate)&&(!toDate||p.date<=toDate) ? total : 0 );
  }
  if(!fromDate&&!toDate)return total; // unscoped report — full amount is fully covered across all its months
  var months=p.leaseMonths||1;
  var perMonth=total/months;
  var startD=new Date(p.leaseFrom);
  var coveredAmount=0;
  for(var i=0;i<months;i++){
    var mD=new Date(startD.getFullYear(),startD.getMonth()+i,1);
    var mKey=mD.getFullYear()+'-'+String(mD.getMonth()+1).padStart(2,'0');
    var mStart=mKey+'-01';
    var mEndDate=new Date(mD.getFullYear(),mD.getMonth()+1,0);
    var mEnd=mKey+'-'+String(mEndDate.getDate()).padStart(2,'0');
    // Does this month overlap with the report's [fromDate,toDate] window?
    var overlaps=(!fromDate||mEnd>=fromDate)&&(!toDate||mStart<=toDate);
    if(overlaps)coveredAmount+=perMonth;
  }
  return coveredAmount;
}
function getFinancialMetrics(){
  var scope=AppState.rep_scope,fromDate=AppState.rep_date_from,toDate=AppState.rep_date_to;
  var ponds=AppState.db.ponds.filter(p=>p.project===AppState.project);
  var totalBigha=ponds.reduce((s,p)=>s+(+p.bigha||0),0);
  var pondRatioMap={};ponds.forEach(p=>pondRatioMap[p.pond]=totalBigha>0?(+p.bigha||0)/totalBigha:0);
  function inRange(d){if(!fromDate&&!toDate)return true;if(fromDate&&d<fromDate)return false;if(toDate&&d>toDate)return false;return true;}
  var m={rev:0,cogs:0,opex:0,interest:0};
  (AppState.db.receipts||[]).filter(r=>r.project===AppState.project&&inRange(r.date)).forEach(r=>{
    var val=+r.grandTotal||0;
    if(scope==='all')m.rev+=val;else if(r.pond===scope)m.rev+=val;else if(r.pond==='Overall Project')m.rev+=val*(pondRatioMap[scope]||0);
  });
  (AppState.db.payments||[]).filter(p=>p.project===AppState.project).forEach(p=>{
    var val=(p.head==='Lease Value')?getProratedLeaseAmount(p,fromDate,toDate):(inRange(p.date)?(+p.netAmount||+p.amount||0):0);
    if(val===0)return;
    var isCOGS=['Feed Cost','Fingerling Cost','Medicine Cost'].indexOf(p.head)!==-1;
    var wt=0;
    if(scope==='all')wt=1;else if(p.locator===scope)wt=1;else if(p.locator==='Project'||p.locator==='GStore')wt=(pondRatioMap[scope]||0);
    if(isCOGS)m.cogs+=val*wt;else m.opex+=val*wt;
  });
  var funds=(AppState.db.funds||[]).filter(f=>f.project===AppState.project&&f.source==='Company');
  var now=new Date();
  funds.forEach(f=>{var amt=+f.amount||0;var d=new Date(f.date);var months=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());var interest=months>0?(amt*0.14)*(months/12):0;if(scope==='all')m.interest+=interest;else m.interest+=interest*(pondRatioMap[scope]||0);});
  m.grossProfit=m.rev-m.cogs;m.ebit=m.grossProfit-m.opex;m.pbt=m.ebit-m.interest;m.tax=Math.max(0,m.pbt*0.15);m.netProfit=m.pbt-m.tax;
  var cash=calcCashMetrics();m.totalFund=cash.totalFund;m.compFund=cash.compFund;
  return m;
}

  var bioBaseCost=fingerlingCost+inv.consumedFeedMedCost+otherCOGS;

function getXlsFilters(){
  var from=document.getElementById('xls-from')?document.getElementById('xls-from').value:'';
  var to=document.getElementById('xls-to')?document.getElementById('xls-to').value:'';
  var month=document.getElementById('xls-month')?document.getElementById('xls-month').value:'';
  var year=document.getElementById('xls-year')?document.getElementById('xls-year').value:'';
  return{from,to,month,year};
}
function applyXlsFilters(records,f){
  return records.filter(r=>{
    var d=r.date||'';
    if(f.from&&d<f.from)return false;
    if(f.to&&d>f.to)return false;
    if(f.month&&!d.startsWith((f.year||new Date().getFullYear())+'-'+f.month))return false;
    if(f.year&&!d.startsWith(f.year))return false;
    return true;
  });
}

var IFMS_CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbxrvDtRnNuHGOb2LIPpMCiLjdJNUhXXNNCjUxH94gT6a0otWck4y_8rDMoDDo7_y79b/exec'
};

// POST via no-cors (GAS requires this from external HTML files)
function gasPost(payload) {
  return fetch(IFMS_CONFIG.GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
}

// GET via JSONP (avoids CORS entirely for reads)
function gasGet(params) {
  return new Promise(function(resolve, reject) {
    var cbName = 'ifms_cb_' + Date.now();
    var script = document.createElement('script');
    var qs = Object.keys(params).map(function(k){ return k+'='+encodeURIComponent(params[k]); }).join('&');
    script.src = IFMS_CONFIG.GAS_URL + '?' + qs + '&callback=' + cbName;
    script.onerror = function(){ reject(new Error('JSONP request failed')); document.body.removeChild(script); };
    var timer = setTimeout(function(){ reject(new Error('Timeout')); if(document.body.contains(script)) document.body.removeChild(script); }, 15000);
    window[cbName] = function(data) {
      clearTimeout(timer);
      delete window[cbName];
      if(document.body.contains(script)) document.body.removeChild(script);
      resolve(data);
    };
    document.body.appendChild(script);
  });
}

async function syncToSheet() {
  if (!AppState.project) { showToast('Select a project first.', 'var(--amber)'); return; }
  showToast('Syncing to Google Sheet…', 'var(--blue)');
  try {
    await gasPost({ action: 'sync', project: AppState.project, data: AppState.db });
    // no-cors means we can't read the response — assume success after 2s
    setTimeout(function(){ showToast('✅ Synced to Google Sheet!', 'var(--green)'); }, 2000);
  } catch (e) {
    showToast('❌ Sync error: ' + e.message, 'var(--red)');
  }
}

async function appendToSheet(table, record) {
  if (!AppState.project) return;
  try {
    gasPost({ action: 'append', project: AppState.project, table: table, record: record });
    // Fire-and-forget; silent failure handled by next full sync
  } catch (e) {
    console.warn('appendToSheet failed:', e.message);
  }
}

async function loadFromSheet(project) {
  showToast('Loading data from Google Sheet…', 'var(--blue)');
  try {
    var json = await gasGet({ action: 'load', project: project });
    if (json.status === 'ok' && json.data) {
      var d = json.data;
      AppState.db.payments        = (d.payments        || []).map(sheetRowToPayment);
      AppState.db.receipts        = (d.receipts        || []).map(sheetRowToReceipt);
      AppState.db.funds           = (d.funds           || []).map(sheetRowToFund);
      AppState.db.fish_movement   = (d.fish_movement   || []).map(sheetRowToMovement);
      AppState.db.mortality       = (d.mortality       || []).map(sheetRowToMortality);
      AppState.db.feed_issues     = (d.feed_issues     || []).map(sheetRowToFeedIssue);
      AppState.db.medicine_issues = (d.medicine_issues || []).map(sheetRowToMedIssue);
      var sheetPonds = (d.ponds || []).map(sheetRowToPond).filter(function(p){return p.project && p.pond;});
      if (sheetPonds.length > 0) AppState.db.ponds = sheetPonds;
      showToast('✅ Data loaded from Google Sheet!', 'var(--green)');
      renderActiveView();
    } else {
      showToast('Sheet empty — starting fresh.', 'var(--amber)');
    }
  } catch (e) {
    showToast('⚠️ Could not load from Sheet: ' + e.message, 'var(--amber)');
  }
}
