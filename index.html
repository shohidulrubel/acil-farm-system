<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ACIL Backward Linkage Project - Fish Module</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1c4587;--blue2:#2e75b6;--blue-l:#e8f0fe;
  --green:#1e7e34;--green-l:#e8f5e9;
  --red:#c0392b;--red-l:#fdecea;
  --amber:#e67e22;--amber-l:#fff3cd;
  --teal:#0891b2;--teal-l:#e0f2fe;
  --gray:#f0f4f8;--border:#dde3ec;
  --text:#1a1a1a;--text2:#555;--text3:#888;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray);min-height:100vh;color:var(--text);-webkit-text-size-adjust:100%}

.header{background:linear-gradient(135deg,#0a2340,var(--blue));color:#fff;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-logo{width:32px;height:32px;border-radius:8px;object-fit:contain;background:#fff;padding:2px}
.hdr-title{font-size:13px;font-weight:700;margin:0;line-height:1.2}
.hdr-sub{font-size:10px;opacity:.7;margin:0}

.content{padding:1rem 1rem 40px;max-width:600px;margin:0 auto}

.gateway-container{text-align:center;padding:1rem 0}
.gateway-title{font-size:15px;font-weight:700;color:#0a2340;margin-bottom:1.25rem}
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.tile-card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:1.25rem 1rem;text-align:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.05);transition:transform 0.15s, border-color 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.tile-card:active, .tile-card.active{transform:scale(0.97);border-color:var(--blue2);background:var(--blue-l)}
.tile-card .tile-icon{font-size:26px}
.tile-card .tile-label{font-size:12px;font-weight:700;color:var(--text)}
.tile-card .tile-subtext{font-size:10px;color:var(--text3);margin-top:2px}

.back-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:10px;padding:8px 12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.btn-back{background:none;border:none;color:var(--blue);font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.active-project-badge{background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px}

.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:1rem;display:flex;align-items:center;gap:6px;padding-bottom:8px;border-bottom:1.5px solid var(--gray)}

.flbl2{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:5px;margin-top:2px}
input[type=date],input[type=number],input[type=text],select.sel{width:100%;font-size:14px;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:#f8fafc;color:var(--text);margin-bottom:10px;appearance:none;-webkit-appearance:none;font-family:inherit}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.stock-table,.issue-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.stock-table th,.issue-table th{background:var(--blue);color:#fff;padding:8px;text-align:left;font-size:11px;font-weight:600}
.stock-table td,.issue-table td{padding:8px;border-bottom:1px solid var(--gray);vertical-align:middle}
.stock-table .tot{font-weight:700;background:var(--blue-l);color:var(--blue)}

.issue-table input{margin-bottom:0;padding:6px;font-size:13px;width:80px}
.issue-table select{margin-bottom:0;padding:6px;font-size:12px;width:90px}

.btn{width:100%;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px}
.btn:active{opacity:.85}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-red{background:var(--red);color:#fff}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:25px;font-size:13px;font-weight:600;color:#fff;z-index:999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:88vw}
.toast.ok{background:var(--green)}
</style>
</head>
<body>

<div class="header">
  <div class="hdr-l">
    <img class="hdr-logo" src="https://d2t8nl1y0ie1km.cloudfront.net/public/images/shwapno_logo_og.jpg" alt="Logo">
    <div>
      <p class="hdr-title">ACIL Backward Linkage Project</p>
      <p class="hdr-sub" id="hdr-context-sub">Fish Operation IFMS Module</p>
    </div>

</div>

<div class="app-wrap">
  <div class="content" id="main-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbzWSefAo-2fHefsDlwequURtDQYuU9beRHwOoes_fiNUTLLgtM0NXiZZslXuBJlTaE4/exec';
var FISH_PROJ = { Mohonpur: 3, Durgapur: 4 };
var CORE_UOMS = ['Kg','Ltr','Gm','Ml','Pcs','Each','Doz','Box','Bottle','Pack','Bag'];
var DEFAULTS_SPECIES = ['Bighead','Black Carp','Catla','Chital','Foli','Grass Carp','Mirror Carp (Japani)','Mrigel','Rui','Silver Carp'];
var FEED_TYPES = ['Carp Grower Sinking Feed', 'Carp Grower Floating Feed', 'Mixed Feed'];
var FISH_HEADS = ['Lease Value','Fingerling Cost','Feed Cost','Labor Cost','Pond Management','Medicine Cost','Electricity & Water Supply','Transport Cost','Shed Cost','Harvesting Cost','Maintenance & Others Cost'];

var S = { 
  screen: 'project_gateway', 
  proj: null, 
  fishActionMode: 'purchase', // purchase, transfer, sales, mortality
  recs: [] 
};

function today(){return new Date().toISOString().split('T')[0];}
function fmt(n){return Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});}
function toast(msg){var t=qs('toast');t.textContent=msg;t.className='toast ok';t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}
function qs(id){return document.getElementById(id);}

window.onload = function(){
  renderCurrentScreen();
  fetchAll();
};

function renderCurrentScreen(){
  var c = qs('main-content');
  var subHdr = qs('hdr-context-sub');
  
  if (S.screen == 'project_gateway') {
    subHdr.textContent = "Fish Operation IFMS Gateway";
    c.innerHTML = tplProjectGateway();
  } 
  else if (S.screen == 'modules_menu') {
    subHdr.textContent = "Project: " + S.proj + " Workspace";
    c.innerHTML = tplModulesMenu();
  } 
  else if (S.screen == 'inventory_menu') {
    c.innerHTML = renderBackNavigationHeader('modules_menu') + tplInventoryMenu();
  }
  else if (S.screen == 'fish_stock_dash') {
    c.innerHTML = renderBackNavigationHeader('inventory_menu') + tplFishStockDash();
    renderStockTable();
  }
  else if (S.screen == 'feed_stock_dash') {
    c.innerHTML = renderBackNavigationHeader('inventory_menu') + tplFeedStockDash();
    rebuildPondIssueGrid('feed');
  }
  else if (S.screen == 'medicine_stock_dash') {
    c.innerHTML = renderBackNavigationHeader('inventory_menu') + tplMedicineStockDash();
    rebuildPondIssueGrid('medicine');
    renderMedicineStock();
  }
  else if (S.screen == 'cost') {
    c.innerHTML = renderBackNavigationHeader('modules_menu') + tplCost();
  } 
  else if (S.screen == 'sales') {
    c.innerHTML = renderBackNavigationHeader('modules_menu') + tplSales();
  } 
  else if (S.screen == 'fund') {
    c.innerHTML = renderBackNavigationHeader('modules_menu') + tplFund();
  }
}

function fetchAll(){
  fetch(API+'?action=getAll&pt=fish')
    .then(function(r){return r.json();})
    .then(function(d){
      S.recs=d.rows||[];
      renderCurrentScreen();
    }).catch(function(){});
}

function post(data,cb){
  fetch(API,{method:'POST',body:JSON.stringify(data)}).then(function(r){return r.json();}).then(cb).catch(function(){alert('Network sync failure.');});
}

function renderBackNavigationHeader(targetScreen){
  var label = "⬅️ Back Dashboard";
  if (targetScreen == 'project_gateway') label = "⬅️ Back to Project Gateway";
  if (targetScreen == 'modules_menu') label = "⬅️ Back to Modules";
  if (targetScreen == 'inventory_menu') label = "⬅️ Back to Inventory Sub-Tiles";
  
  return '<div class="back-bar">'
       + '  <button class="btn-back" onclick="navigateToScreen(\''+targetScreen+'\')">'+label+'</button>'
       + '  <span class="active-project-badge">📍 '+S.proj+'</span>'
       + '</div>';
}

function navigateToScreen(screenName) {
  S.screen = screenName;
  renderCurrentScreen();
}

function selectProjectFromGateway(projName) {
  S.proj = projName;
  S.screen = 'modules_menu';
  renderCurrentScreen();
}

function getPondOptions(includeOverall){
  var h = '';
  if(includeOverall) h += '<option value="Overall Project">🌍 Overall Project View</option>';
  var n=FISH_PROJ[S.proj]||3; 
  for(var i=1;i<=n;i++) h+='<option value="'+i+'">Pond Zone Unit '+i+'</option>';
  return h;
}
function getPondOptionsWithGlobal(){
  var h = '<option value="Overall Project">⭐ Overall Project Head</option>';
  var n=FISH_PROJ[S.proj]||3; for(var i=1;i<=n;i++)h+='<option value="'+i+'">Pond Zone Unit '+i+'</option>';
  return h;
}
function getSpeciesDataList(){
  return '<datalist id="species-defaults">' + DEFAULTS_SPECIES.map(function(s){return '<option value="'+s+'">';}).join('') + '</datalist>';
}

// --- PROJECT GATEWAY ---

  var list = Object.keys(FISH_PROJ);
  return '<div class="gateway-container">'
       + '  <h2 class="gateway-title">Select Active Target Project</h2>'
       + '  <div class="tiles-grid">'
       +     list.map(function(p){

                    + '  <div class="tile-icon">Island 🏝️</div>'
                    + '  <div class="tile-label">'+p+' Project</div>'
                    + '  <div class="tile-subtext">'+FISH_PROJ[p]+' Pond Areas</div>'
                    + '</div>';
             }).join('')
       + '  </div>'
       + '</div>';
}

// --- MAIN MODULES (4 OPTIONS - TILES MODE) ---
function tplModulesMenu(){
  return '<div class="gateway-container">'
       + '  <div class="back-bar"><button class="btn-back" onclick="navigateToScreen(\'project_gateway\')">⬅️ Back to Project Selection</button><span class="active-project-badge">📍 '+S.proj+'</span></div>'
       + '  <h2 class="gateway-title" style="margin-top:10px;">Select Application Module</h2>'
       + '  <div class="tiles-grid">'
       + '    <div class="tile-card" onclick="navigateToScreen(\'inventory_menu\')">'
       + '      <div class="tile-icon">📦</div>'
       + '      <div class="tile-label">Inventory Management</div>'
       + '      <div class="tile-subtext">Fish, Feed, Medicine Stock Tiles</div>'
       + '    </div>'
       + '    <div class="tile-card" onclick="navigateToScreen(\'cost\')">'
       + '      <div class="tile-icon">💰</div>'
       + '      <div class="tile-label">Cost Booking</div>'
       + '      <div class="tile-subtext">Log Operational Opex</div>'
       + '    </div>'
       + '    <div class="tile-card" onclick="navigateToScreen(\'sales\')">'
       + '      <div class="tile-icon">📈</div>'
       + '      <div class="tile-label">Sales Entry</div>'
       + '      <div class="tile-subtext">Fish & Others Commercials</div>'
       + '    </div>'
       + '    <div class="tile-card" onclick="navigateToScreen(\'fund\')">'
       + '      <div class="tile-icon">🏦</div>'
       + '      <div class="tile-label">Fund Received</div>'
       + '      <div class="tile-subtext">Capital Ledger Injections</div>'
       + '    </div>'
       + '  </div>'
       + '</div>';
}

// --- INVENTORY MANAGEMENT SUB-TILES ---
function tplInventoryMenu(){
  return '<div class="gateway-container">'
       + '  <h2 class="gateway-title">Inventory Management Sub-Modules</h2>'
       + '  <div class="tiles-grid">'
       + '    <div class="tile-card" onclick="navigateToScreen(\'fish_stock_dash\')">'
       + '      <div class="tile-icon">🐟</div>'
       + '      <div class="tile-label">Fish Stock</div>'
       + '      <div class="tile-subtext">Purchase, Transfer, Sales, Mortality</div>'
       + '    </div>'
       + '    <div class="tile-card" onclick="navigateToScreen(\'feed_stock_dash\')">'
       + '      <div class="tile-icon">🌾</div>'
       + '      <div class="tile-label">Feed Stock</div>'
       + '      <div class="tile-subtext">Procurement & Allocation</div>'
       + '    </div>'
       + '    <div class="tile-card" onclick="navigateToScreen(\'medicine_stock_dash\')">'
       + '      <div class="tile-icon">💊</div>'
       + '      <div class="tile-label">Medicine Stock</div>'
       + '      <div class="tile-subtext">Inward Logs & Outward Issues</div>'
       + '    </div>'
       + '  </div>'
       + '</div>';
}

// --- DYNAMIC BACKEND CALCULATOR (SUPPORTS PROJECT-WISE OVERALL SUMS) ---
function getDynamicFishStockSummary(proj, filterPond, species){
  var purchasePcs = 0, transferInPcs = 0, transferOutPcs = 0, salesPcs = 0, mortalityPcs = 0;
  var purchaseBio = 0, transferInBio = 0, transferOutBio = 0, salesBio = 0, mortalityBio = 0;
  
  S.recs.filter(function(r){return r.project === proj;}).forEach(function(r){
    var rSp = (r.fishType || r.speciesName || '').trim().toLowerCase();
    var target = species.trim().toLowerCase();
    
    if(rSp === target){
      var isTargetPond = (filterPond === 'Overall Project' || r.pond == filterPond);
      var qty = +r.qty || +r.quantityPcs || 0;
      var bio = +r.weight || +r.weightKg || 0;
      
      if(r.type === 'fishstock' && isTargetPond){ purchasePcs += qty; purchaseBio += bio; }
      if(r.type === 'mortality' && isTargetPond){ mortalityPcs += qty; mortalityBio += bio; }
      if(r.type === 'fishsales' && isTargetPond){ salesPcs += qty; salesBio += bio; }
      
      if(r.type === 'transfer'){
        if(filterPond === 'Overall Project') {
          // Internal cross-pond transfers cancel out on an overall project scale
          if(r.fromPond === 'External Source' || r.toPond === 'External Recipient') {
            if(r.fromPond === 'External Source') { transferInPcs += qty; transferInBio += bio; }
            if(r.toPond === 'External Recipient') { transferOutPcs += qty; transferOutBio += bio; }
          }
        } else {
          if(r.fromPond == filterPond) { transferOutPcs += qty; transferOutBio += bio; }
          if(r.toPond == filterPond) { transferInPcs += qty; transferInBio += bio; }
        }
      }
    }
  });

  var closingQty = purchasePcs + transferInPcs - transferOutPcs - salesPcs - mortalityPcs;
  var closingBiomass = purchaseBio + transferInBio - transferOutBio - salesBio - mortalityBio;
  
  return { qty: Math.max(0, closingQty), biomass: Math.max(0, closingBiomass) };
}

// --- SUB-MODULE: FISH STOCK SUB-TILES PANEL ---
function tplFishStockDash(){
  var m = S.fishActionMode;
  var h = '<div class="gateway-container" style="padding-top:0;">'
        + '  <h3 class="gateway-title" style="margin-bottom:10px; font-size:13px; text-align:left; color:var(--text2)">⚙️ Form Transaction Category</h3>'
        + '  <div class="tiles-grid" style="grid-template-columns: repeat(4, 1fr); gap:6px; margin-bottom:12px;">'
        + '    <div class="tile-card '+(m=='purchase'?'active':'')+'" style="padding:10px 4px; border-radius:10px;" onclick="setFishMode(\'purchase\')"><span style="font-size:16px">📥</span><b style="font-size:10px">Purchase</b></div>'
        + '    <div class="tile-card '+(m=='transfer'?'active':'')+'" style="padding:10px 4px; border-radius:10px;" onclick="setFishMode(\'transfer\')"><span style="font-size:16px">🔄</span><b style="font-size:10px">Transfer</b></div>'
        + '    <div class="tile-card '+(m=='sales'?'active':'')+'" style="padding:10px 4px; border-radius:10px;" onclick="setFishMode(\'sales\')"><span style="font-size:16px">📈</span><b style="font-size:10px">Sales</b></div>'
        + '    <div class="tile-card '+(m=='mortality'?'active':'')+'" style="padding:10px 4px; border-radius:10px;" onclick="setFishMode(\'mortality\')"><span style="font-size:16px">☠️</span><b style="font-size:10px">Mortality</b></div>'
        + '  </div>'
        + '</div>';

  h += '<div class="card"><div class="card-title" id="fsk-form-title">📝 Fish Entry Log</div>'
     + '  <div class="two-col">'
     + '    <div><label class="flbl2">Processing Date</label><input type="date" id="fsk-date" value="'+today()+'"></div>'
     + '    <div id="pond-input-wrapper"><label class="flbl2">Target Pond Unit</label><select class="sel" id="fsk-pond">'+getPondOptions(false)+'</select></div>'
     + '  </div>'
     + '  <div class="two-col">'
     + '    <div><label class="flbl2">Fish Type Species</label><input type="text" id="fsk-species" list="species-defaults" placeholder="e.g. Rui">'+getSpeciesDataList()+'</div>'
     + '    <div><label class="flbl2">Quantity Count (Pcs)</label><input type="number" id="fsk-qty" value="0" oninput="autoCalcFishBiomass()"></div>'
     + '  </div>'
     + '  <div class="two-col">'
     + '    <div><label class="flbl2">Avg Weight (Kg/Pc)</label><input type="number" id="fsk-avgwt" value="0.200" step="0.001" oninput="autoCalcFishBiomass()"></div>'
     + '    <div><label class="flbl2">Calculated Biomass (Kg)</label><input type="number" id="fsk-biomass" value="0" readonly style="background:var(--blue-l); font-weight:700;"></div>'
     + '  </div>'
     + '  <button class="btn btn-blue" id="fsk-submit-btn" onclick="commitFishTransaction()">Post Data Entry</button>'
     + '</div>'
     + '<div class="card"><div class="card-title">📊 Live Stock Status View Summary (Project Wise)</div>'
     + '  <label class="flbl2">Select Pond Filter View</label><select class="sel" id="fsk-filter-pond" onchange="renderStockTable()">'+getPondOptions(true)+'</select>'
     + '  <div id="stock-table-box"></div>'
     + '</div>';
  return h;
}

function setFishMode(mode){
  S.fishActionMode = mode;
  renderCurrentScreen();
  var title = qs('fsk-form-title');
  var btn = qs('fsk-submit-btn');
  var pWrapper = qs('pond-input-wrapper');
  
  if(mode == 'purchase') {
    title.innerHTML = '📥 1. Purchase Stock Input Panel';
    btn.className = 'btn btn-blue';
    pWrapper.innerHTML = '<label class="flbl2">Target Allocation Pond</label><select class="sel" id="fsk-pond">'+getPondOptions(false)+'</select>';
  } else if(mode == 'transfer') {
    title.innerHTML = '🔄 2. Internal Cross-Pond Transfer Panel';
    btn.className = 'btn btn-teal';
    pWrapper.innerHTML = '<label class="flbl2">Source Pond</label><select class="sel" id="fsk-pond">'+getPondOptions(false)+'</select>'
                       + '<label class="flbl2">Destination Pond</label><select class="sel" id="fsk-pond-to">'+getPondOptions(false)+'</select>';
  } else if(mode == 'sales') {
    title.innerHTML = '📈 3. Live Commercial Sales Order Panel';
    btn.className = 'btn btn-green';
    pWrapper.innerHTML = '<label class="flbl2">Harvesting Pond Location</label><select class="sel" id="fsk-pond">'+getPondOptions(false)+'</select>';
  } else if(mode == 'mortality') {
    title.innerHTML = '☠️ 4. Loss / Mortality Event Registration';
    btn.className = 'btn btn-red';
    pWrapper.innerHTML = '<label class="flbl2">Affected Pond Structure</label><select class="sel" id="fsk-pond">'+getPondOptions(false)+'</select>';
  }
}

function autoCalcFishBiomass(){
  qs('fsk-biomass').value = ((+qs('fsk-qty').value||0) * (+qs('fsk-avgwt').value||0)).toFixed(2);
}

function commitFishTransaction(){
  var mode = S.fishActionMode;
  var sp = qs('fsk-species').value.trim();
  var dateStr = qs('fsk-date').value;
  var pFrom = qs('fsk-pond').value;
  var q = +qs('fsk-qty').value||0;
  var avg = +qs('fsk-avgwt').value||0;
  var bio = q * avg;

  if(!sp || q <= 0){ alert('Species Name and positive numeric quantities required.'); return; }
  
  var payload = { action: 'save', project: S.proj, date: dateStr, fishType: sp, qty: q, weight: bio };
  
  if(mode == 'purchase') {
    payload.type = 'fishstock'; payload.pond = pFrom;
    post(payload, function(){ toast('Purchase verified and committed.'); fetchAll(); });
  } 
  else if(mode == 'mortality') {
    payload.type = 'mortality'; payload.pond = pFrom; payload.reason = 'Routine Check AT';
    post(payload, function(){ toast('Mortality registered safely.'); fetchAll(); });
  } 
  else if(mode == 'sales') {
    payload.type = 'fishsales'; payload.pond = pFrom; payload.partyName = 'Spot Cash Market';
    payload.speciesName = sp; payload.quantityPcs = q; payload.weightKg = bio; payload.avgWeight = avg;
    payload.rateTkKg = 180; payload.amount = bio*180; payload.commission = 0; payload.grandTotal = bio*180;
    post(payload, function(){ toast('Sales log entry integrated.'); fetchAll(); });
  } 
  else if(mode == 'transfer') {
    var pTo = qs('fsk-pond-to').value;
    if(pFrom == pTo) { alert('Source and Destination structures match.'); return; }
    payload.type = 'transfer'; payload.fromPond = pFrom; payload.toPond = pTo;
    post(payload, function(){ toast('Cross-pond relocation complete.'); fetchAll(); });
  }
}

function renderStockTable(){
  var b=qs('stock-table-box'); if(!b)return;
  var targetFilter=qs('fsk-filter-pond').value;
  var trackTypes=[];
  S.recs.forEach(function(r){
    var f = (r.fishType || r.speciesName || '').trim();
    if(f && trackTypes.indexOf(f)===-1) trackTypes.push(f);
  });
  if(trackTypes.length===0) trackTypes = DEFAULTS_SPECIES;
  
  var titleContext = (targetFilter === 'Overall Project') ? "Portfolio-Wide Sum" : "Pond " + targetFilter;
  var h='<table class="stock-table"><thead><tr><th>Species ('+titleContext+')</th><th>Closing Qty</th><th>Closing Biomass</th></tr></thead><tbody>';
  var totPcs=0; var totBio=0;
  
  trackTypes.forEach(function(ft){
    var metric = getDynamicFishStockSummary(S.proj, targetFilter, ft);
    totPcs += metric.qty; totBio += metric.biomass;
    h+='<tr><td><b>'+ft+'</b></td><td>'+fmt(metric.qty)+' Pcs</td><td>'+fmt(metric.biomass)+' Kg</td></tr>';
  });
  h+='<tr class="tot"><td>Project Summary Aggregation</td><td>'+fmt(totPcs)+' Pcs</td><td>'+fmt(totBio)+' Kg</td></tr></tbody></table>';
  b.innerHTML=h;
}

      + '  <label class="flbl2">Filter Balance View Scope</label><select class="sel" id="med-filter-pond" onchange="renderMedicineStock()">'+getPondOptions(true)+'</select>'

function rebuildPondIssueGrid(moduleKey){
  var box = qs('multi-pond-grid-box'); if(!box) return;
  var n = FISH_PROJ[S.proj]||3;
  var unitLabel = (moduleKey === 'feed') ? 'Kg' : 'Units';
  var h = '<table class="issue-table"><thead><tr><th>Structural Target Structure</th><th>Qty Outward</th><th>Metric Unit</th></tr></thead><tbody>';
  for(var i=1; i<=n; i++){
    h += '<tr><td><b>Pond Location Unit '+i+'</b></td>'
      + '<td><input type="number" class="grid-qty-input" data-pond="'+i+'" value="0" step="0.01" oninput="sumGridAllocationItems(\''+moduleKey+'\')"></td>'
      + '<td><span style="font-weight:700; color:var(--text3)">'+unitLabel+'</span></td></tr>';
  }
  box.innerHTML = h+'</tbody></table>';
}

function sumGridAllocationItems(moduleKey){
  var total = 0;
  document.querySelectorAll('.grid-qty-input').forEach(function(inp){ total += (+inp.value||0); });
  var trail = (moduleKey === 'feed') ? ' Kg' : ' Units';
  if(qs('lbl-total-issued-today')) qs('lbl-total-issued-today').textContent = total.toFixed(2) + trail;
}

function commitFeedOrMedInward(moduleKey){
  var sup = qs('pur-supplier').value.trim(); 
  var brand = qs('pur-brand').value.trim(); 
  var count = +qs('pur-bags').value||0;
  if(!sup || !brand || count <= 0){ alert('Please fill in supplier, material identification, and quantities.'); return; }
  
  var payload = {
    action:'save', type: moduleKey, project: S.proj, date: qs('pur-date').value, supplier: sup,
    feedType: brand, medType: brand, purQty: count, issQty: 0, purKg: qs('pur-kg').value, issKg: 0, pond: 'Inventory Store'
  };
  post(payload, function(){ toast('Inward warehouse cargo cataloged.'); fetchAll(); });
}

function commitMultiPondDispersal(moduleKey){
  var brand = qs('iss-brand').value.trim(); 
  var dateStr = qs('iss-date').value;
  if(!brand){ alert('Define active material identity name values.'); return; }
  
  var rows = document.querySelectorAll('.grid-qty-input');
  var logsList = [];
  rows.forEach(function(inp){
    var p = inp.getAttribute('data-pond'); 
    var val = +inp.value||0;
    if(val > 0){
      logsList.push({
        action:'save', type: moduleKey, project: S.proj, date: dateStr, supplier: 'Internal Warehouse',
        feedType: brand, medType: brand, purQty: 0, issQty: val, purKg: 0, issKg: val, pond: p
      });
    }
  });
  if(logsList.length === 0){ alert('Define at least one layout distribution line.'); return; }
  var completed = 0;
  logsList.forEach(function(item){
    post(item, function(){ completed++; if(completed === logsList.length){ toast('Apportionment execution successful.'); fetchAll(); } });
  });
}

function renderMedicineStock(){
  var box=qs('med-stock-box'); if(!box) return;
  var targetFilter = qs('med-filter-pond').value;
  var ledger={};
  
  S.recs.filter(function(r){return r.type==='medicine' && r.project===S.proj;}).forEach(function(r){
    var isPondMatch = (targetFilter === 'Overall Project' || r.pond == targetFilter || (targetFilter === 'Inventory Store' && r.pond === 'Inventory Store'));
    if(isPondMatch){
      var name = (r.medType || 'Generic Particular');
      if(!ledger[name]) ledger[name] = 0;
      ledger[name] += ((+r.purQty||0) - (+r.issQty||0));
    }
  });
  
  var h='<table class="stock-table"><thead><tr><th>Medical Item Brand Name</th><th>Closing Dynamic Store Balance</th></tr></thead><tbody>';
  var entries=Object.keys(ledger); 
  if(entries.length===0) h+='<tr><td colspan="2">No available tracked material in selected scope.</td></tr>';
  entries.forEach(function(k){ h+='<tr><td>'+k+'</td><td><b>'+fmt(ledger[k])+' Units</b></td></tr>'; });
  box.innerHTML=h+'</tbody></table>';
}

function saveCost(){

  var data={action:'save',type:'cost',project:S.proj,date:qs('co-date').value,head:qs('co-head').value,particular:part,uom:qs('co-uom').value,qty:qs('co-qty').value,rate:qs('co-rate').value,amount:amt,pond:qs('co-pond').value};

function tplSales(){
  return '<div class="card"><div class="card-title">📈 Dispatch Primary Fish Sales Order</div>'
    + '<div class="two-col"><div><label class="flbl2">Log Date</label><input type="date" id="sal-date" value="'+today()+'"></div>'

    + '<div class="two-col"><div><label class="flbl2">Challan Number</label><input type="text" id="sal-challan" placeholder="Challan ID"></div>'
    + '<div><label class="flbl2">Source Harvesting Pond</label><select class="sel" id="sal-pond">'+getPondOptions(false)+'</select></div></div>'
    + '<div class="two-col"><div><label class="flbl2">Species Target Name</label><input type="text" id="sal-species" list="species-defaults" placeholder="e.g. Rui">'+getSpeciesDataList()+'</div>'
    + '<div><label class="flbl2">Quantity Payload Count (Pcs)</label><input type="number" id="sal-pcs" value="0" oninput="calcSalesRow()"></div></div>'
    + '<div class="two-col"><div><label class="flbl2">Biomass Weight (Kg)</label><input type="number" id="sal-kg" value="0" step="0.01" oninput="calcSalesRow()"></div>'
    + '<div><label class="flbl2">Avg Wt (Kg/Pc)</label><input type="number" id="sal-avg" value="0" readonly style="background:#f1f5f9"></div></div>'
    + '<div class="two-col"><div><label class="flbl2">Sales Price Rate (৳/Kg)</label><input type="number" id="sal-rate" value="0" oninput="calcSalesRow()"></div>'
    + '<div><label class="flbl2">Gross Valuation Subtotal (৳)</label><input type="number" id="sal-amt" value="0" readonly style="background:#f1f5f9"></div></div>'
    + '<label class="flbl2">Outflow Agent Commission (৳)</label><input type="number" id="sal-comm" value="0" oninput="calcSalesRow()">'
    + '<label class="flbl2">Calculated Net Grand Total Realized (৳)</label><input type="number" id="sal-grand" value="0" readonly style="font-weight:700;color:var(--green);background:var(--blue-l)">'
    + '<button class="btn btn-green" onclick="saveFishSales()">Commit Fish Sales Voucher</button></div>';
}
function calcSalesRow(){
  var pcs = +qs('sal-pcs').value||0; var kg = +qs('sal-kg').value||0; var rate = +qs('sal-rate').value||0; var comm = +qs('sal-comm').value||0;
  qs('sal-avg').value = (pcs > 0) ? (kg / pcs).toFixed(3) : 0;
  qs('sal-amt').value = (kg * rate).toFixed(2);
  qs('sal-grand').value = ((kg * rate) - comm).toFixed(2);
}
function saveFishSales(){
  var party = qs('sal-party').value.trim(); var sp = qs('sal-species').value.trim(); var kg = +qs('sal-kg').value||0;
  if(!party||!sp||kg<=0){alert('Party validation failed.');return;}
  var data = {
    action:'save',type:'fishsales',project:S.proj,date:qs('sal-date').value,partyName:party,challanNo:qs('sal-challan').value,pond:qs('sal-pond').value,
    speciesName:sp,quantityPcs:qs('sal-pcs').value,weightKg:kg,avgWeight:qs('sal-avg').value,rateTkKg:qs('sal-rate').value,amount:qs('sal-amt').value,commission:qs('sal-comm').value,grandTotal:qs('sal-grand').value
  };
  post(data, function(){toast('Fish sales booked successfully.'); fetchAll(); navigateToScreen('modules_menu');});
}
